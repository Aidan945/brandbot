<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configure · BrandBot</title>
<style>
  :root {
    --bg: #f8fafb; --text: #181b22; --muted: #414b59; --accent: #2d6f88; --accent-2: #3b88a6;
    --border: rgba(31, 38, 48, 0.16); --panel: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(circle 820px at 96% 160px, rgba(59, 130, 160, 0.22), transparent 58%),
      radial-gradient(circle 560px at 12% 84%, rgba(184, 95, 112, 0.12), transparent 62%),
      linear-gradient(to right, rgba(16, 24, 40, 0.055) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(16, 24, 40, 0.05) 1px, transparent 1px),
      var(--bg);
    background-size: auto, auto, 6rem 4rem, 6rem 4rem, auto;
    background-attachment: fixed, fixed, fixed, fixed, scroll;
  }
  .wrap { width: min(1200px, calc(100% - 48px)); margin: 0 auto; padding-bottom: 32px; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; }
  .brand { font-weight: 800; letter-spacing: -0.02em; font-size: 17px; display: flex; gap: 9px; align-items: center; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px rgba(45,111,136,.6); }
  nav .links { display: flex; gap: 24px; font-size: 14px; }
  nav a { color: var(--muted); text-decoration: none; font-weight: 600; } nav a:hover, nav a.active { color: var(--text); }

  h1 { font-size: clamp(25px, 2.8vw, 32px); letter-spacing: -0.04em; margin: 2px 0 4px; }
  .lead { color: var(--muted); font-size: 15px; margin: 0 0 14px; max-width: 560px; line-height: 1.45; }

  .grid { display: grid; grid-template-columns: 1.12fr .88fr; gap: 22px; align-items: start; }
  @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }

  /* stage height tracks the viewport so the whole robot box is visible without
     scrolling on a laptop screen */
  .stage { position: relative; height: clamp(340px, calc(100svh - 196px), 560px); border-radius: 20px; overflow: hidden;
    border: 1px solid var(--border); background: rgba(255,255,255,0.45);
    box-shadow: 0 24px 60px -34px rgba(20,30,50,.4), inset 0 1px 0 rgba(255,255,255,.6); }
  .stage .crop { position: absolute; inset: 0; overflow: hidden;
    -webkit-mask-image: linear-gradient(180deg, #000 90%, transparent 100%);
    mask-image: linear-gradient(180deg, #000 90%, transparent 100%); }
  .stage .scale { position: absolute; inset: 0; transform: scale(1.12) translateY(8%); transform-origin: center top; }
  .stage .hint { position: absolute; left: 16px; bottom: 12px; font-size: 11.5px; color: #8a93a0; z-index: 2; }

  .actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .actions .btn { flex: 1; text-align: center; }

  .side { display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px;
    box-shadow: 0 10px 30px -22px rgba(20,30,50,.35); }
  .card h2 { margin: 0 0 12px; font-size: 12px; letter-spacing: .07em; text-transform: uppercase; color: #7a8492; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 6px 0; font-size: 13.5px; color: #2a3340; }
  input[type=color] { width: 44px; height: 28px; border: 1px solid var(--border); border-radius: 7px; padding: 1px; background: #fff; cursor: pointer; }
  input[type=text] { flex: 1; max-width: 190px; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--text); outline: none; }
  input[type=text]:focus { border-color: var(--accent); }
  .toggle { appearance: none; width: 40px; height: 22px; border-radius: 99px; background: #cdd5de; position: relative; cursor: pointer; transition: background .15s; }
  .toggle:checked { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .toggle:checked::after { left: 20px; }
  .btn { font-size: 13px; font-weight: 600; padding: 8px 13px; border-radius: 9px; border: 1px solid var(--border); background: #fff; color: var(--text); cursor: pointer; }
  .btn:hover { background: #f1f4f7; }
  .filebtn input { display: none; }

  /* segmented tab control at the top of the side card */
  .tabs { display: inline-flex; background: #eef1f4; border-radius: 10px; padding: 3px; margin-bottom: 16px; }
  .tabs button { border: none; background: none; font-size: 13px; font-weight: 600; color: var(--muted); padding: 6px 18px; border-radius: 8px; cursor: pointer; }
  .tabs button.active { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .codebar { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 12px; }
  .cbtn { font-size: 12.5px; font-weight: 650; padding: 7px 13px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--text); cursor: pointer; white-space: nowrap; }
  .cbtn:hover { background: #f1f4f7; }
  .cbtn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .cbtn.accent:hover { background: #27617a; }
  .codeblock { background: #0c1320; border: 1px solid #1b2638; border-radius: 12px; padding: 16px; margin: 0;
    font: 12.5px/1.6 ui-monospace, "SF Mono", Menlo, monospace; color: #d6e2f2; white-space: pre; overflow-x: auto; }
  .hint-line { font-size: 12px; color: #8a93a0; margin: 12px 2px 0; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="brand"><span class="dot"></span> BrandBot</div>
    <div class="links">
      <a href="./index.html">Showcase</a>
      <a href="./configure.html" class="active">Configure</a>
      <a href="https://github.com/Aidan945/brandbot" target="_blank">GitHub</a>
    </div>
  </nav>
  <h1>Make it yours.</h1>
  <p class="lead">Tweak the colors and chest logo, then copy the exact code. The preview is
     how it ships — locked in its box, facing forward, following your cursor.</p>
  <div id="root"></div>
</div>

<script type="module">
import { createElement, useRef, useState, useMemo } from 'react';
import { createRoot } from 'react-dom/client';
import htm from 'htm';
import { BrandBot } from '../dist/index.js';
const html = htm.bind(createElement);

const DEFAULTS = {
  primary: '#17171c', accent: '#08080a', visor: '#b0b0b8', hands: '#77777e',
  eyes: '#e9f4ff', logoColor: '#ffffff', logoText: 'BrandBot', legs: true,
};

function codeFor(s, logoImage) {
  const p = [];
  if (s.primary !== DEFAULTS.primary)     p.push(['primary', s.primary]);
  if (s.accent !== DEFAULTS.accent)       p.push(['accent', s.accent]);
  if (s.visor !== DEFAULTS.visor)         p.push(['visor', s.visor]);
  if (s.hands !== DEFAULTS.hands)         p.push(['hands', s.hands]);
  if (s.eyes !== DEFAULTS.eyes)           p.push(['eyes', s.eyes]);
  if (logoImage)                          p.push(['logoImage', logoImage]);
  else {
    if (s.logoText !== DEFAULTS.logoText)   p.push(['logoText', s.logoText]);
    if (s.logoColor !== DEFAULTS.logoColor) p.push(['logoColor', s.logoColor]);
  }
  if (!s.legs)                            p.push(['legs', false]);
  const lines = p.map(([k, v]) => typeof v === 'string' ? `  ${k}="${v}"` : `  ${k}={${v}}`);
  return [
    `import { BrandBot } from 'brandbot';`, ``,
    `<div style={{ height: 600 }}>`,
    p.length ? `  <BrandBot\n  ${lines.join('\n  ')}\n  />` : `  <BrandBot />`,
    `</div>`,
  ].join('\n');
}

function fileToDataURL(file, max = 512) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const k = Math.min(1, max / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * k); c.height = Math.round(img.height * k);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(img.src);
      resolve(c.toDataURL('image/png'));
    };
    img.src = URL.createObjectURL(file);
  });
}
const shortenDataUris = code =>
  code.replace(/(data:image\/[a-z+]+;base64,)[A-Za-z0-9+/=]{32,}/g,
    (m, pre) => `${pre}…full base64 on copy (${Math.round(m.length / 1024)} KB)…`);

// A self-contained brief an AI coding agent (or a developer) can paste and act
// on: what the component is, how to install/use it, the full API, the chosen
// config, integration notes, and a closing task that defers placement to you.
function promptFor(s, logoImage) {
  return `I want to add **BrandBot** to my app — an open-source 3D robot mascot. It's a drop-in React component (TypeScript, built on Three.js) that renders an interactive 3D robot: it stays locked in place facing forward, follows the visitor's cursor with its head, blinks, and gestures. Every color and the chest logo are props, and the 3D model is bundled in the package, so there's nothing else to host.

## Install
\`\`\`bash
npm install brandbot three react
\`\`\`

## Usage
The component fills its parent, so always give it a sized box. This is the exact configuration I want:
\`\`\`jsx
${codeFor(s, logoImage)}
\`\`\`

## Next.js / SSR
WebGL can't be server-rendered — load it client-side only:
\`\`\`jsx
import dynamic from 'next/dynamic';
const BrandBot = dynamic(() => import('brandbot').then(m => m.BrandBot), { ssr: false });
\`\`\`

## Props (all optional)
- \`primary\`, \`accent\`, \`visor\`, \`hands\`, \`eyes\`, \`logoColor\` — CSS color strings
- \`logoText\` — chest text logo (1–3 words); \`logoImage\` — URL/data-URI image logo (overrides text)
- \`legs\` (bool, false = upper body only) · \`orbit\` (bool, drag-to-rotate, default false = locked) · \`intro\` (bool, zoom-in on load, default true)
- \`trackPointer\` ('window' | 'element' | false) · \`shadow\` (bool) · \`className\`, \`style\`
- Imperative ref: \`ref.current.spin()\` (one 360° turn), \`ref.current.replay()\` (replay the intro)
All color/logo/legs props are live — update them via state and the robot changes instantly.

## Optional: full-bleed hero (robot rises from the bottom of the section)
\`\`\`jsx
<div style={{ height: '100vh', overflow: 'hidden', WebkitMaskImage: 'linear-gradient(180deg,#000 88%,transparent 100%)' }}>
  <div style={{ position: 'absolute', inset: 0, transform: 'scale(1.1) translateY(8%)', transformOrigin: 'center top' }}>
    <BrandBot /* ...props... *//>
  </div>
</div>
\`\`\`

## License
Component code is MIT. The bundled NEXBOT model is a Spline Community asset under CC0 1.0 (public domain) — free to use commercially, no attribution required.

## Your task
Add BrandBot to my app with the configuration above. First ask me which page/section it should go in and at what size, then implement it (rendering client-side), and confirm it builds and displays.`;
}

function App() {
  const [s, setS] = useState(DEFAULTS);
  const [logoImage, setLogoImage] = useState(null);
  const [logoUrl, setLogoUrl] = useState('');
  const [copied, setCopied] = useState(false);
  const [copiedPrompt, setCopiedPrompt] = useState(false);
  const [tab, setTab] = useState('customize');
  const bot = useRef(null);
  const up = patch => setS(prev => ({ ...prev, ...patch }));
  const code = useMemo(() => codeFor(s, logoImage), [s, logoImage]);

  const color = (label, key) => html`
    <div class="row"><span>${label}</span>
      <input type="color" value=${s[key]} onInput=${e => up({ [key]: e.target.value })} /></div>`;

  return html`
    <div class="grid">
      <div class="stage">
        <div class="crop"><div class="scale">
          <${BrandBot} ref=${bot}
            primary=${s.primary} accent=${s.accent} visor=${s.visor} hands=${s.hands}
            eyes=${s.eyes} logoText=${s.logoText} logoColor=${s.logoColor}
            logoImage=${logoImage} legs=${s.legs} trackPointer="window" />
        </div></div>
      </div>

      <div class="side">
        <div class="card">
          <div class="tabs">
            <button class=${tab === 'customize' ? 'active' : ''} onClick=${() => setTab('customize')}>Customize</button>
            <button class=${tab === 'code' ? 'active' : ''} onClick=${() => setTab('code')}>Code</button>
          </div>

          ${tab === 'customize' ? html`
            ${color('Body', 'primary')}
            ${color('Joints', 'accent')}
            ${color('Face plate', 'visor')}
            ${color('Hands', 'hands')}
            ${color('Eyes', 'eyes')}
            ${color('Logo color', 'logoColor')}
            <div class="row"><span>Logo text</span>
              <input type="text" value=${s.logoText} placeholder="YOUR BRAND"
                onInput=${e => { setLogoImage(null); setLogoUrl(''); up({ logoText: e.target.value }); }} /></div>
            <div class="row"><span>Logo image</span>
              <label class="btn filebtn">Upload
                <input type="file" accept="image/*" onChange=${async e => {
                  const f = e.target.files[0]; if (f) { setLogoUrl(''); setLogoImage(await fileToDataURL(f)); }
                }} /></label></div>
            <div class="row"><span>…or image URL</span>
              <input type="text" value=${logoUrl} placeholder="https://…/logo.png"
                onInput=${e => { setLogoUrl(e.target.value); setLogoImage(e.target.value.trim() || null); }} /></div>
            <div class="row"><span>Legs</span>
              <input type="checkbox" class="toggle" checked=${s.legs} onChange=${e => up({ legs: e.target.checked })} /></div>
            <div class="actions">
              <button class="btn" onClick=${() => bot.current?.replay()}>Replay intro</button>
              <button class="btn" onClick=${() => bot.current?.spin()}>Spin</button>
            </div>
          ` : html`
            <div class="codebar">
              <button class="cbtn accent" onClick=${async () => {
                await navigator.clipboard.writeText(promptFor(s, logoImage));
                setCopiedPrompt(true); setTimeout(() => setCopiedPrompt(false), 1500);
              }}>${copiedPrompt ? 'Copied ✓' : 'Copy prompt for agent'}</button>
              <button class="cbtn" onClick=${async () => {
                await navigator.clipboard.writeText(code);
                setCopied(true); setTimeout(() => setCopied(false), 1500);
              }}>${copied ? 'Copied ✓' : 'Copy code'}</button>
            </div>
            <pre class="codeblock">${shortenDataUris(code)}</pre>
            <p class="hint-line">Paste the code into your app, or hand the agent prompt to your AI coding assistant.</p>
          `}
        </div>
      </div>
    </div>`;
}
createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
